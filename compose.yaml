services:
  vllm:
    image: vllm/vllm-openai:v0.18.0
    container_name: vllm-qwen35-4b
    restart: unless-stopped
    ports:
      - "8000:8000"
    ipc: host
    gpus: all
    environment:
      HF_TOKEN: ${HF_TOKEN:-}
    volumes:
      - /mnt/greenova-models/.cache/huggingface:/root/.cache/huggingface
    command: >
      --model cyankiwi/Qwen3.5-2B-AWQ-4bit
      --max-model-len 2048
      --gpu-memory-utilization 0.88
      --enable-prefix-caching
      --trust-remote-code
      --default-chat-template-kwargs '{"enable_thinking": false}'

  invoice-extraction-api:
    build:
      context: ./src/invoice-extraction-api
    depends_on:
      - vllm
    environment:
      PORT: 9998
      HOST: 0.0.0.0
      TEMP_DIR: /tmp/invoice-extraction
      VLLM_BASE_URL: http://vllm:8000
      VLLM_MODEL: ${VLLM_MODEL:-cyankiwi/Qwen3.5-4B-AWQ-4bit}
      ALLOW_REMOTE_URLS: "true"
      KEEP_DEBUG_FILES: "true"
      REQUEST_TIMEOUT_MS: 120000
      REMOTE_FETCH_TIMEOUT_MS: 30000
      MAX_CONTENT_ITEMS: 10
      MAX_FILE_BYTES: 10485760
      MAX_TOTAL_BYTES: 52428800
      MAX_PDF_PAGES: 20
      MAX_TOTAL_IMAGES: 40
      LOG_LEVEL: info
    ports:
      - 9998:9998
    volumes:
      - ./tmp:/tmp/invoice-extraction
