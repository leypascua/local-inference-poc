services:
  llamacpp-server:
    image: ghcr.io/ggml-org/llama.cpp:server-cuda
    gpus: all
    ports: 
      - 8080:8080
    volumes:
      - ~/.lmstudio/models:/models
    environment:
      # alternatively, you can use "LLAMA_ARG_MODEL_URL" to download the model
      LLAMA_ARG_MODEL: /models/unsloth/Qwen3.5-4B-GGUF/Qwen3.5-4B-Q8_0.gguf
      LLAMA_ARG_MMPROJ: /models/unsloth/Qwen3.5-4B-GGUF/mmproj-F32.gguf
      LLAMA_ARG_ALIAS: Qwen3.5-4B-Q8
      LLAMA_ARG_CTX_SIZE: 16384
      LLAMA_ARG_N_GPU_LAYERS: all
      LLAMA_ARG_N_PARALLEL: 1
      LLAMA_ARG_FLASH_ATTN: on
      LLAMA_ARG_IMAGE_MIN_TOKENS: 1024
      LLAMA_ARG_THINK_BUDGET: 0
      LLAMA_ARG_CACHE_RAM: 0
      LLAMA_ARG_ENDPOINT_METRICS: 1
      LLAMA_ARG_HOST: 0.0.0.0
      LLAMA_ARG_PORT: 8080

  invoice-extraction-api:
    build:
      context: ./src/invoice-extraction
    depends_on:
      - llamacpp-server
    environment:
      PORT: 9998
      HOST: 0.0.0.0
      TEMP_DIR: /tmp/invoice-extraction
      LLAMA_BASE_URL: http://llamacpp-server:8080
      LLAMA_MODEL: Qwen3.5-4B-Q8
      ALLOW_REMOTE_URLS: "true"
      KEEP_DEBUG_FILES: "true"
      REQUEST_TIMEOUT_MS: 120000
      REMOTE_FETCH_TIMEOUT_MS: 30000
      MAX_CONTENT_ITEMS: 10
      MAX_FILE_BYTES: 10485760
      MAX_TOTAL_BYTES: 52428800
      MAX_PDF_PAGES: 20
      MAX_TOTAL_IMAGES: 40
      LOG_LEVEL: info
    ports:
      - 9998:9998
    volumes:
      - ./tmp:/tmp/invoice-extraction
