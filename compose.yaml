services:
  vllm-server:
    build:
      context: ./src/vllm-server
    gpus: all
    command: >-
      --model zai-org/GLM-OCR
      --host 0.0.0.0
      --port 8080
      --allowed-local-media-path /tmp/invoice-extraction
      --trust-remote-code
      --gpu-memory-utilization 0.95
      --max-model-len 32768
    ports:
      - 8080:8080
    volumes:
      - ~/.cache/huggingface:/root/.cache/huggingface
      - ./tmp:/tmp/invoice-extraction
    environment:
      HF_TOKEN: ${HF_TOKEN:-}

  invoice-extraction-api:
    build:
      context: ./src/invoice-extraction-api
    depends_on:
      - vllm-server
    environment:
      PORT: 9998
      HOST: 0.0.0.0
      TEMP_DIR: /tmp/invoice-extraction
      VLLM_BASE_URL: http://vllm-server:8080
      VLLM_MODEL: zai-org/GLM-OCR
      ALLOW_REMOTE_URLS: "true"
      KEEP_DEBUG_FILES: "true"
      REQUEST_TIMEOUT_MS: 120000
      REMOTE_FETCH_TIMEOUT_MS: 30000
      MAX_CONTENT_ITEMS: 10
      MAX_FILE_BYTES: 10485760
      MAX_TOTAL_BYTES: 52428800
      MAX_PDF_PAGES: 20
      MAX_TOTAL_IMAGES: 40
      LOG_LEVEL: info
    ports:
      - 9998:9998
    volumes:
      - ./tmp:/tmp/invoice-extraction
